apis:
  - aid: discover-data-vic-gov-au:catalog
    name: DataVic Victoria CKAN Action API
    description: >-
      CKAN Action API for DataVic Victoria, a consistent JSON-over-HTTP interface over a catalog of 5,585 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://discover.data.vic.gov.au/api/3/action/.
    humanURL: https://discover.data.vic.gov.au
