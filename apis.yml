aid: discover-data-vic-gov-au
name: DataVic Victoria
description: >-
  DataVic Victoria is a state government open-data portal for Australia running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 5,585 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
